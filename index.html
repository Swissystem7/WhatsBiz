function generateHybridReply(context, userMessage) {
  const blacklist = ['זין', 'בן זונה', 'כוס', 'לך תמות', 'מפגר', 'שמוק', 'חרא', 'טמבל'];
  const bookingKeywords = ['קבוע', 'תור', 'קבע'];
  const pricingKeywords = ['מחיר', 'עולה', 'כמה'];
  const locationKeywords = ['כתובת', 'איפה'];

  if (!userMessage || userMessage.trim() === '') {
    return 'סליחה, לא הצלחתי להבין. אפנה אותך לנציג תוך 5 דקות.';
  }

  const lowerMessage = userMessage.toLowerCase();
  for (const word of blacklist) {
    if (lowerMessage.includes(word)) {
      return 'אנא שמור על שפה מכבדת. אפנה אותך לנציג תוך 5 דקות.';
    }
  }

  const customerName = context.customerName || 'לך';
  const clinicName = context.clinicName || 'המרפאה';

  let intent = 'other';
  for (const keyword of bookingKeywords) {
    if (lowerMessage.includes(keyword)) {
      intent = 'booking';
      break;
    }
  }
  if (intent === 'other') {
    for (const keyword of pricingKeywords) {
      if (lowerMessage.includes(keyword)) {
        intent = 'pricing';
        break;
      }
    }
  }
  if (intent === 'other') {
    for (const keyword of locationKeywords) {
      if (lowerMessage.includes(keyword)) {
        intent = 'location';
        break;
      }
    }
  }

  if (intent === 'booking') {
    return `שלום ${customerName}, תודה שפנית אל ${clinicName}. אשמח לקבוע לך תור. מתי נוח לך?`;
  } else if (intent === 'pricing') {
    return `שלום ${customerName}, תודה שפנית אל ${clinicName}. המחירים משתנים לפי סוג הטיפול. אשמח לפרט לך במייל או בטלפון.`;
  } else if (intent === 'location') {

  } else {
    return `סליחה, לא הצלחתי להבין. אפנה אותך לנציג תוך 5 דקות.`;
  }
}

'use strict';

// WhatsBiz — scheduleReminders
// No-show reminders: given a confirmed booking start time, compute the
// reminder send-times (default 24h + 2h before — the pattern shown across
// 2026 market data to cut no-shows 40-60%). Skips any reminder whose
// send-time already passed relative to `now` (can't send into the past).
// Pure/deterministic: inject `now` for tests. No Math.random.
// Returns [{ hoursBefore, sendAt: ISO }] sorted ascending by sendAt.
// ponytail: fixed offsets + past-skip only. Quiet-hours shifting (don't
// fire a reminder at 03:00) is the upgrade path if SMBs complain about
// timing — pair with isBusinessOpen; not built until the need is real.

function scheduleReminders(bookingStart, opts) {
  const start = bookingStart instanceof Date ? bookingStart : new Date(bookingStart);
  if (isNaN(start.getTime())) return [];

  const o = opts && typeof opts === 'object' ? opts : {};
  const now = o.now instanceof Date ? o.now
    : (o.now != null ? new Date(o.now) : new Date());
  if (isNaN(now.getTime())) return [];

  const offsets = Array.isArray(o.hoursBefore) && o.hoursBefore.length
    ? o.hoursBefore
    : [24, 2];

  const reminders = [];
  for (const h of offsets) {
    const hours = Number(h);
    if (!isFinite(hours) || hours <= 0) continue;
    const sendAt = new Date(start.getTime() - hours * 3600 * 1000);
    if (sendAt.getTime() <= now.getTime()) continue;   // past — can't send
    if (sendAt.getTime() >= start.getTime()) continue; // guard against bad offset
    reminders.push({ hoursBefore: hours, sendAt: sendAt.toISOString() });
  }

  reminders.sort((a, b) => (a.sendAt < b.sendAt ? -1 : a.sendAt > b.sendAt ? 1 : 0));
  return reminders;
}

module.exports = { scheduleReminders };

// detectLanguage: 'he'/'en'/'unknown' by share of Hebrew vs Latin LETTERS.
// Letters = Hebrew (֐-׿) or Latin (A-Za-z) only; digits/spaces/punct
// (and other scripts) are ignored in the denominator.
function detectLanguage(text) {
  if (typeof text !== 'string') return 'unknown';
  let he = 0;
  let latin = 0;
  for (const ch of text) {
    if (ch >= '֐' && ch <= '׿') he++;
    else if ((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z')) latin++;

  if (letters === 0) return 'unknown';
  if (he / letters > 0.3) return 'he'; // Hebrew wins ties when both exceed 30%
  if (latin / letters > 0.3) return 'en';
  return 'unknown';
}

module.exports = { detectLanguage };
