<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WhatsBiz | עוזר קביעת תורים</title><style>
:root{--green:#19a766;--deep:#073c2c;--pale:#effaf4;--line:#d4e9dd;--muted:#60736a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#e7f8ef,#f9fcfa 55%);font-family:Arial,sans-serif;color:var(--deep);min-height:100vh}.wrap{max-width:920px;margin:auto;padding:42px 20px}header{text-align:center;margin-bottom:26px}header span{color:var(--green);font-weight:bold}h1{font-size:clamp(2.2rem,6vw,4rem);margin:8px}.phone{max-width:720px;margin:auto;background:white;border:1px solid var(--line);border-radius:25px;overflow:hidden;box-shadow:0 20px 55px #125a3520}.bar{padding:17px 22px;background:var(--deep);color:#fff;display:flex;justify-content:space-between}.chat{padding:24px;min-height:270px;background:var(--pale)}.bubble{max-width:82%;padding:13px 15px;margin:9px 0;border-radius:15px;line-height:1.5}.customer{background:white;margin-right:auto}.bot{background:#d4f4e2}.meta{font-size:.75rem;color:var(--muted);margin-top:4px}.controls{padding:20px;background:white;border-top:1px solid var(--line)}label{font-size:.82rem;color:var(--muted)}textarea{width:100%;resize:vertical;min-height:72px;margin:7px 0;padding:12px;border:1px solid var(--line);border-radius:12px;font:inherit}button{background:var(--green);color:white;border:0;padding:12px 18px;border-radius:10px;font-weight:bold;cursor:pointer}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.chip{padding:7px 9px;border-radius:99px;background:#eff6f2;font-size:.78rem}.error{color:#a22}
</style></head><body><main class="wrap"><header><span>WHATS<span dir="ltr">BIZ</span> / SMART INBOX</span><h1>מתעניינים הופכים לתורים.</h1><p>פענוח הודעת לקוח, ניסוח תשובה ותזמון תזכורות — במקום אחד.</p></header><section class="phone"><div class="bar"><b>מרפאת חיוך</b><span>● מחובר</span></div><div class="chat" id="chat"></div><form class="controls" id="form"><label>הודעת לקוח</label><textarea id="message">היי, שמי דנה ואני רוצה לקבוע תור לטיפול מחר בשעה 16:30</textarea><button>נתח ושלח תשובה</button></form></section></main><script>
/*__LIB_BUNDLE__*/
const Biz={...__require('lib/parseBookingRequest.js'),...__require('lib/generateHybridReply.js'),...__require('lib/scheduleReminders.js'),...__require('lib/detectLanguage.js')};const $=x=>document.getElementById(x),esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function run(e){if(e)e.preventDefault();try{const msg=$('message').value,parsed=Biz.parseBookingRequest(msg),reply=Biz.generateHybridReply({customerName:parsed?.patientName||'דנה',clinicName:'מרפאת חיוך'},msg);let reminders=[];if(parsed?.date&&parsed?.time){const start=new Date(`${parsed.date}T${parsed.time}:00`);reminders=Biz.scheduleReminders(start,{now:new Date()})}$('chat').innerHTML=`<div class="bubble customer">${esc(msg)}</div><div class="bubble bot">${esc(reply)}<div class="meta">מענה אוטומטי · WhatsBiz</div></div><div class="chips"><span class="chip">שפה: ${esc(Biz.detectLanguage(msg))}</span><span class="chip">כוונה: ${parsed?'קביעת תור':'כללית'}</span><span class="chip">ביטחון: ${Math.round((parsed?.confidence||0)*100)}%</span>${parsed?.date?`<span class="chip">${parsed.date} · ${parsed.time||'שעה חסרה'}</span>`:''}${reminders.map(r=>`<span class="chip">תזכורת ${r.hoursBefore} שעות לפני</span>`).join('')}</div>`}catch(err){$('chat').innerHTML=`<p class="error">${esc(err.message)}</p>`}}$('form').addEventListener('submit',run);run();
</script></body></html>
