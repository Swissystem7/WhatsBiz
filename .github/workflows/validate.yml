name: validate
on:
  push:
  workflow_dispatch:
jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax-check inline scripts in index.html
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('index.html','utf8');const s=[...h.matchAll(/<script>([\\s\\S]*?)<\\/script>/g)].map(m=>m[1]);if(!s.length){throw new Error('no scripts found')}s.forEach(x=>new Function(x));console.log('OK: '+s.length+' inline scripts parse cleanly')"
      - name: Confirm single-file app present
        run: test -f index.html && echo "index.html present"
